name: Automatic PURL mapping

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Limit packages processed (blank = all)"
        required: false
        default: ""
      only:
        description: "Comma-separated package names (blank = all)"
        required: false
        default: ""
      force:
        description: "Re-process even when (version, build) matches the cached entry"
        required: false
        default: "false"
        type: boolean
  schedule:
    # Every 24 hours at 03:17 UTC. Off the hour to avoid the cron rush.
    - cron: "17 3 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automap
  cancel-in-progress: false

jobs:
  automap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          cache: true

      - name: Snapshot baseline auto.json
        # Capture HEAD's mappings before automap rewrites the file so the
        # summary step can diff against it.
        run: |
          mkdir -p /tmp/automap_baseline
          git show HEAD:mappings/auto.json > /tmp/automap_baseline/auto.json 2>/dev/null \
            || echo '{"packages":{}}' > /tmp/automap_baseline/auto.json

      - name: Run automap
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${{ inputs.limit }}" ]; then ARGS+=(--limit "${{ inputs.limit }}"); fi
          if [ -n "${{ inputs.only }}" ]; then ARGS+=(--only "${{ inputs.only }}"); fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS+=(--force); fi
          pixi run python -m scripts.automap "${ARGS[@]}"

      - name: Merge mappings for the SPA
        run: pixi run python -m scripts.merge_mappings

      - name: Generate PR body
        run: |
          pixi run python -m scripts.automap_summary \
            --before /tmp/automap_baseline/auto.json \
            --after mappings/auto.json \
            > /tmp/automap_pr_body.md
          echo "----- PR body preview -----"
          cat /tmp/automap_pr_body.md

      - name: Open / update PR if mappings changed
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            mappings/auto.json
            web/public/mappings.json
          branch: automap/refresh
          base: main
          title: "automap: refresh PURL mappings"
          body-path: /tmp/automap_pr_body.md
          commit-message: "automap: refresh PURL mappings"
          delete-branch: true
