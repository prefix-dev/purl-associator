name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "mappings/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Refresh served mappings.json (auto + manual + contributions)
        run: |
          mkdir -p web/public
          python3 scripts/merge_mappings.py

      - name: Install web deps
        working-directory: web
        run: npm ci || npm install

      - name: Build
        working-directory: web
        env:
          VITE_REPO_OWNER: ${{ github.repository_owner }}
          VITE_REPO_NAME: ${{ github.event.repository.name }}
          VITE_REPO_BRANCH: ${{ github.event.repository.default_branch }}
          VITE_OAUTH_WORKER_URL: ${{ vars.OAUTH_WORKER_URL }}
          VITE_GITHUB_CLIENT_ID: ${{ vars.OAUTH_CLIENT_ID }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
