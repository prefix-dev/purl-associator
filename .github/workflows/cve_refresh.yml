name: Refresh CVE assignments

on:
  workflow_dispatch:
    inputs:
      only:
        description: "Comma-separated package names (blank = all)"
        required: false
        default: ""
      limit:
        description: "Process at most N candidates (blank = no limit)"
        required: false
        default: ""
      force_osv:
        description: "Force re-download of OSV dumps"
        required: false
        default: "false"
        type: boolean
  schedule:
    # Every 24 hours at 04:37 UTC — staggered off the automap run so the two
    # PRs don't land on top of each other.
    - cron: "37 4 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cve-refresh
  cancel-in-progress: false

jobs:
  cve-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          cache: true

      - name: Snapshot baseline mappings/cves
        # Materialise HEAD's per-package CVE files into a sibling dir so the
        # summary step can diff against them after cve_match rewrites.
        run: |
          rm -rf /tmp/cves_baseline
          mkdir -p /tmp/cves_baseline
          git ls-tree -r HEAD --name-only mappings/cves \
            | while read -r path; do
                if [[ "$path" == mappings/cves/*.json ]]; then
                  git show "HEAD:$path" > "/tmp/cves_baseline/$(basename "$path")"
                fi
              done

      - name: Refresh merged PURL mappings (input to the matcher)
        run: pixi run python -m scripts.merge_mappings

      - name: Match CVEs against conda-forge versions
        run: |
          set -euo pipefail
          ARGS=()
          if [ -n "${{ inputs.only }}" ]; then ARGS+=(--only "${{ inputs.only }}"); fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS+=(--limit "${{ inputs.limit }}"); fi
          if [ "${{ inputs.force_osv }}" = "true" ]; then ARGS+=(--force-osv); fi
          # When run with a subset, keep stale files around so reviewers don't
          # lose unrelated packages between manual triggers.
          if [ -n "${{ inputs.only }}" ] || [ -n "${{ inputs.limit }}" ]; then
            ARGS+=(--no-clean-stale)
          fi
          pixi run python -m scripts.cve_match "${ARGS[@]}"

      - name: Merge CVEs + reviewer contributions for the SPA
        run: pixi run python -m scripts.merge_cves

      - name: Generate PR body
        run: |
          pixi run python -m scripts.cve_summary \
            --before-dir /tmp/cves_baseline \
            --after-dir mappings/cves \
            > /tmp/cves_pr_body.md
          echo "----- PR body preview -----"
          cat /tmp/cves_pr_body.md

      - name: Open / update PR if anything changed
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: |
            mappings/cves/**
            web/public/cves.json
          branch: cves/refresh
          base: main
          title: "cves: refresh advisories"
          body-path: /tmp/cves_pr_body.md
          commit-message: "cves: refresh advisories"
          delete-branch: true
