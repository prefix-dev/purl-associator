name: AI vet PURL mappings

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "API mode (realtime = fast/dispatch, batches = cheap/scheduled)"
        required: false
        default: "realtime"
        type: choice
        options:
          - realtime
          - batches
      limit:
        description: "Limit packages processed (blank = all)"
        required: false
        default: "200"
      skip_vetted:
        description: "Skip packages already vetted at the same version+build"
        required: false
        default: "true"
        type: boolean
      only:
        description: "Comma-separated package names (blank = all)"
        required: false
        default: ""
      ai_batch_size:
        description: "Packages per Haiku call"
        required: false
        default: "15"
      commit_every:
        description: "git push every N chunks (0 = only at end)"
        required: false
        default: "16"
  schedule:
    # Weekly full sweep in batches mode (50% off, async, runs over ~24h).
    - cron: "23 4 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-vet
  cancel-in-progress: false

jobs:
  ai-vet:
    runs-on: ubuntu-latest
    # Batches can run for up to 24h; realtime should finish in minutes-to-an-hour.
    timeout-minutes: 1440
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so we can branch off main and push.
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: latest
          cache: true

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Switch to ai-vet/refresh branch
        run: |
          set -euo pipefail
          # Always run with main's latest code, but preserve data files
          # accumulated on ai-vet/refresh from prior runs. Branch keeps its
          # data; main's code/workflow updates land via merge.
          if git ls-remote --exit-code --heads origin ai-vet/refresh >/dev/null 2>&1; then
            echo "Branch exists — checking out and merging main"
            git checkout -B ai-vet/refresh origin/ai-vet/refresh
            # Prefer main for any conflicting code/workflow files; data files
            # under mappings/ai_vet/ are append-only so they won't conflict.
            git merge origin/main --no-edit -X theirs
          else
            echo "Creating branch from main"
            git checkout -B ai-vet/refresh origin/main
            git push -u origin ai-vet/refresh
          fi

      - name: Run AI vet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          MODE="${{ inputs.mode || 'batches' }}"
          LIMIT="${{ inputs.limit }}"
          ONLY="${{ inputs.only }}"
          SKIP_VETTED="${{ inputs.skip_vetted == 'false' && 'false' || 'true' }}"
          AI_BATCH_SIZE="${{ inputs.ai_batch_size || '15' }}"
          COMMIT_EVERY="${{ inputs.commit_every || '16' }}"

          ARGS=(--mode "$MODE" --ai-batch-size "$AI_BATCH_SIZE" --commit-every "$COMMIT_EVERY")
          if [ -n "$LIMIT" ]; then ARGS+=(--limit "$LIMIT"); fi
          if [ -n "$ONLY" ]; then ARGS+=(--only "$ONLY"); fi
          if [ "$SKIP_VETTED" = "false" ]; then ARGS+=(--revet); fi

          pixi run python -m scripts.ai_vet "${ARGS[@]}"

      - name: Open PR if not already open
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Idempotent: only opens if there's no OPEN PR. (gh pr view also
          # matches closed PRs on the same branch, so use list --state open.)
          OPEN_PR=$(gh pr list --state open --head ai-vet/refresh --json number -q '.[].number' | head -n1)
          if [ -n "$OPEN_PR" ]; then
            echo "PR #$OPEN_PR already open — branch updates flow into it."
          else
            gh pr create \
              --base main \
              --head ai-vet/refresh \
              --title "ai-vet: refresh AI verdicts on PURL mappings" \
              --body "$(cat <<'EOF'
          Pre-vetting of `mappings/auto.json` by Claude Haiku 4.5.

          For each package the model judges whether the auto-inferred PURL
          is correct, suggesting an alternative when it disagrees. Each run
          writes a fresh per-run sidecar under `mappings/ai_vet/` so PRs
          never conflict with `automap` refreshes.

          Commits land incrementally as the run progresses; review the diff
          and merge when satisfied.
          EOF
          )"
          fi
