name: Deploy OAuth worker to Cloudflare

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install
        working-directory: worker
        run: npm ci || npm install

      # account_id, GITHUB_CLIENT_ID, GITHUB_APP_ID, GITHUB_INSTALLATION_ID
      # are all in wrangler.toml. The two secrets (GITHUB_CLIENT_SECRET and
      # GITHUB_APP_PRIVATE_KEY) live on the worker — they must already have
      # been set with `wrangler secret put` and are not pushed by this job.
      - name: Deploy with wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: worker
