# Cloudflare Worker that handles the GitHub OAuth code-exchange step.
#
# Deploy:
#   wrangler secret put GITHUB_CLIENT_SECRET   # one-time, from the OAuth app
#   wrangler deploy
#
# The frontend POSTs { code, state } to /exchange; the worker swaps that
# with GitHub's OAuth endpoint server-side and returns { access_token }.

name = "purl-associator-oauth"
main = "src/index.ts"
compatibility_date = "2024-09-23"
account_id = "e1a7cde76f1780ec06bac859036dbaf7"  # prefix.dev GmbH

[vars]
# Comma-separated Origin headers allowed to call /exchange. Add the Pages
# URL once it's published.
ALLOWED_ORIGINS = "https://prefix-dev.github.io,http://localhost:5173"
# Public — paired with a GITHUB_CLIENT_SECRET worker secret.
GITHUB_CLIENT_ID = "Ov23litlsxJR1mZN3QHo"
