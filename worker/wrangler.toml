# Cloudflare Worker that handles the GitHub OAuth code-exchange step.
#
# The frontend (deployed to GitHub Pages) cannot call
# https://github.com/login/oauth/access_token directly because that endpoint
# does not return CORS headers AND because we'd need to embed the OAuth
# client_secret in the bundle. This worker keeps the secret server-side.
#
# Deploy with:
#   wrangler secret put GITHUB_CLIENT_SECRET
#   wrangler deploy
#
# Configure the GitHub OAuth App's Authorization callback URL to point at the
# *frontend's* origin (the SPA receives ?code=...&state=... and POSTs to this
# worker's /exchange endpoint).

name = "purl-associator-oauth"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Set via `wrangler.toml` for non-secret config:
[vars]
# Comma-separated list of allowed Origin headers for the CORS preflight.
ALLOWED_ORIGINS = "http://localhost:5173"
GITHUB_CLIENT_ID = ""
