[workspace]
name = "purl-associator"
description = "Generate and edit PURL mappings for conda-forge packages"
authors = ["Wolf Vollprecht <hi@prefix.dev>"]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[dependencies]
python = ">=3.13,<3.14"
py-rattler = ">=0.23.1,<0.24"
pyyaml = ">=6.0,<7"
typer = ">=0.25,<0.26"
httpx = ">=0.28,<0.29"
rich = ">=13"

[feature.dev.dependencies]
ruff = "*"

[environments]
default = []
dev = ["dev"]

[tasks]
automap = "python -m scripts.automap"
merge = "python -m scripts.merge_mappings"
lint = { cmd = "ruff check scripts && ruff format --check scripts", env = {} }
fmt = "ruff format scripts"
